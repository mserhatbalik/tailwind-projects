<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="images/favicon-32x32.png"
    />
    <title>Shortly</title>
  </head>
  <body>
    <!-- Nav Container -->
    <nav class="relative container mx-auto p-6">
      <!-- Flex Container For All Items -->
      <div class="flex items-center justify-between">
        <!-- Flex Container For Logo/Menu-->
        <div class="flex items-center space-x-20">
          <!-- Logo -->
          <img src="images/logo.svg" alt="" />
          <!-- Left Menu -->
          <div class="hidden space-x-8 font-bold lg:flex">
            <a href="" class="text-grayish-violet hover:text-very-dark-violet"
              >Features</a
            >
            <a href="" class="text-grayish-violet hover:text-very-dark-violet"
              >Pricing</a
            >
            <a href="" class="text-grayish-violet hover:text-very-dark-violet"
              >Resources</a
            >
          </div>
        </div>
        <!-- Right Buttons Menu -->
        <div
          class="text-grayish-violet hidden items-center space-x-6 font-bold lg:flex"
        >
          <div class="hover:text-very-dark-violet">Login</div>
          <a
            href=""
            class="bg-cyan rounded-full px-8 py-3 font-bold text-white hover:opacity-70"
            >Sign Up</a
          >
        </div>
        <!-- Hamburger Menu -->
      </div>
      <!-- Mobile Menu -->
    </nav>
    <!-- Hero Section -->
    <section id="hero">
      <!-- Hero Container -->
      <div class="container mx-auto flex flex-col-reverse p-6 lg:flex-row">
        <!-- Content Container -->
        <div class="mb-44 flex flex-col space-y-10 lg:mt-16 lg:w-1/2 xl:mb-52">
          <h1
            class="text-center text-5xl font-bold lg:max-w-md lg:text-left lg:text-6xl"
          >
            More than just shorter links
          </h1>
          <p
            class="text-center text-2xl text-gray-400 lg:max-w-md lg:text-left"
          >
            Build your brand's recognition and get detailed insights on how your
            links are performing.
          </p>

          <div class="mx-auto lg:mx-0">
            <a
              href=""
              class="bg-cyan rounded-full px-10 py-5 text-2xl font-bold text-white hover:opacity-70 lg:py-4"
              >Get Started</a
            >
          </div>
        </div>

        <!-- Image -->
        <div class="mx-auto mb-24 md:w-180 lg:mb-0 lg:w-1/2">
          <img src="images/illustration-working.svg" alt="" />
        </div>
      </div>
    </section>
  </body>
</html>
